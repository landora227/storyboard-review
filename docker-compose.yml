# 本地或单机一键跑成「网站」：静态分镜台 + 协作 WebSocket
# 使用：在本目录执行  docker compose up --build
# 访问：http://localhost:8080/index.html  或  http://localhost:8080/landing.html
services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    depends_on:
      - collab

  collab:
    build: ./collab-server
    ports:
      - "2345:2345"
    environment:
      - HOST=0.0.0.0
      - PORT=2345
